<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>識生學坊 (Recognize)</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // 根據《全域開發規範》：開發環境 (localhost) 下主動註冊所有 Service Worker，避免快取衝突
    if (['localhost', '127.0.0.1'].includes(location.hostname)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('✅ [Dev Mode] Service Worker 已註銷，避免 Vite HMR 衝突');
          }
        });
      }
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
